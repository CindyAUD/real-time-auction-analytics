services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - pipeline_net

  processor:
    build: ./faust_app
    container_name: auction-processor
    depends_on:
      - redpanda
    environment:
      - KAFKA_BROKER=redpanda:9092
      - SINK_BATCH_SIZE=50
    volumes:
      - parquet-data:/data/processed
    networks:
      - pipeline_net
    restart: unless-stopped
    ports:
      - "8001:8001"        # Prometheus metrics
  api:
    build: ./api
    container_name: auction-api
    depends_on:
      - processor   # wait for Parquet files to exist
    ports:
      - "8000:8000" # API server
    volumes:
      - parquet-data:/data/processed:ro   # read-only access to Parquet
    networks:
      - pipeline_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - pipeline_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/auction-pipeline.json
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - pipeline_net
  dashboard:
    build: ./dashboard
    container_name: auction-dashboard
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    networks:
      - pipeline_net
    restart: unless-stopped
  loadtest:
    build: ./loadtest
    container_name: auction-loadtest
    depends_on:
      - api
      - redpanda
    environment:
      - KAFKA_BROKER=redpanda:19092
      - API_HOST=http://api:8000
    networks:
      - pipeline_net
    ports:
      - "8089:8089"
    # Run load test with different configurations:
    # API-only test (headless): docker compose run --rm loadtest locust -f locustfile.py --host=http://api:8000 -u 50 -r 5 --headless
    # Full pipeline test (headless): docker compose run --rm loadtest locust -f locustfile.py --host=http://api:8000 -u 200 -r 20 --headless
    # With web UI: docker compose run --rm -p 8089:8089 loadtest locust -f locustfile.py --host=http://api:8000
    # Extended test: docker compose run --rm loadtest locust -f locustfile.py --host=http://api:8000 -u 500 -r 50 -t 300s --headless

networks:
  pipeline_net:
    driver: bridge

volumes:
  redpanda-data:
  grafana-data:
  parquet-data:
