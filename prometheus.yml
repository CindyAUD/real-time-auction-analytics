global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'redpanda'
    static_configs:
      - targets: ['redpanda:9644']

  - job_name: 'processor'
    static_configs:
      - targets: ['processor:8001']

  - job_name: 'producer'
    static_configs:
      - targets: ['host.docker.internal:8002']
